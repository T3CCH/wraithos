name: Build ISO

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat os/rootfs/usr/share/wraithos/version)" >> "$GITHUB_OUTPUT"

      - name: Build Go binary
        run: |
          docker run --rm -v "${{ github.workspace }}:/build" -w /build \
            alpine:3.21 sh -c '
              apk add --no-cache wget tar
              wget -q https://go.dev/dl/go1.25.0.linux-amd64.tar.gz
              tar -C /usr/local -xzf go1.25.0.linux-amd64.tar.gz
              rm go1.25.0.linux-amd64.tar.gz
              CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
                /usr/local/go/bin/go build \
                -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" \
                -o build/wraith-ui ./cmd/wraith-ui
            '

      - name: Build ISO builder image
        run: docker build -f build/Dockerfile.iso-builder -t wraithos-builder .

      - name: Build ISO
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/build:/out" \
            wraithos-builder

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: wraithos-${{ steps.version.outputs.version }}.iso
          path: build/wraithos-${{ steps.version.outputs.version }}.iso
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: WraithOS ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: build/wraithos-${{ steps.version.outputs.version }}.iso
