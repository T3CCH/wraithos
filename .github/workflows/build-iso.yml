name: Build ISO

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat os/rootfs/usr/share/wraithos/version)" >> "$GITHUB_OUTPUT"

      - name: Build Go binary
        run: |
          docker run --rm -v "${{ github.workspace }}:/build" -w /build \
            golang:1.24-alpine sh -c \
            "GOTOOLCHAIN=auto CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags='-s -w -X main.version=${{ steps.version.outputs.version }}' \
            -o wraith-ui ./cmd/wraith-ui"

      - name: Build ISO in Alpine container
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}:/wraithos" \
            alpine:3.21 /bin/sh -c '
              set -eu

              apk add --no-cache \
                alpine-sdk squashfs-tools grub-efi mtools \
                dosfstools xorriso git fakeroot sudo

              cd /wraithos/os/scripts
              chmod +x build-iso.sh
              bash build-iso.sh
            '

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: wraithos-${{ steps.version.outputs.version }}.iso
          path: os/build/wraithos-${{ steps.version.outputs.version }}.iso
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: WraithOS ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: os/build/wraithos-${{ steps.version.outputs.version }}.iso
